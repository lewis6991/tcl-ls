name: Nightly

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    permissions:
      contents: write
    uses: ./.github/workflows/release-assets.yml
    with:
      release_version: nightly
      release_channel: nightly
      release_tag: nightly
      checkout_ref: ${{ github.sha }}
      stamp_version: false
      create_release: true
    secrets:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
